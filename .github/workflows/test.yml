name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - name: default
            args: ''
          - name: testnet
            args: --features testnet

    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      # Tests only by design: no fmt --check or clippy gates.
      - name: Test
        run: cargo test ${{ matrix.args }}
