name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: exfer-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: exfer-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: exfer-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: exfer-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: exfer-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (ARM Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/exfer${{ contains(matrix.target, 'windows') && '.exe' || '' }} ${{ matrix.artifact }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/exfer-linux-x86_64/exfer-linux-x86_64
            artifacts/exfer-linux-arm64/exfer-linux-arm64
            artifacts/exfer-macos-x86_64/exfer-macos-x86_64
            artifacts/exfer-macos-arm64/exfer-macos-arm64
            artifacts/exfer-windows-x86_64.exe/exfer-windows-x86_64.exe
